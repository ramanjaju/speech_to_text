<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeechHub | Real-Time Translation</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --error-color: #ef4444;
            --success-color: #22c55e;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        header {
            text-align: center;
            padding: 1rem 0;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-fill-color: transparent;
        }

        .config-bar {
            background-color: var(--card-bg);
            padding: 1rem;
            border-radius: 0.75rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            border: 1px solid #334155;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        label { color: var(--text-secondary); font-size: 0.9rem; }

        select {
            background-color: #0f172a;
            color: white;
            border: 1px solid #334155;
            padding: 0.4rem 0.8rem;
            border-radius: 0.4rem;
            outline: none;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #startBtn { background-color: var(--accent-color); color: #0f172a; }
        #startBtn:hover { background-color: var(--accent-hover); }
        #stopBtn { background-color: #334155; color: white; }
        #stopBtn:disabled { opacity: 0.5; cursor: not-allowed; }

        .results {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            height: 400px;
            position: relative;
        }

        .card-header {
            padding: 1rem;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin: 0;
        }

        .copy-btn {
            background: none;
            color: var(--text-secondary);
            padding: 0.2rem;
            font-size: 0.8rem;
            border: 1px solid #334155;
        }
        
        .copy-btn:hover { color: var(--accent-color); border-color: var(--accent-color); }

        .content {
            padding: 1.5rem;
            flex-grow: 1;
            overflow-y: auto;
            line-height: 1.6;
            font-size: 1.1rem;
            white-space: pre-wrap;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #475569;
        }

        .connected .indicator { background-color: var(--success-color); box-shadow: 0 0 8px var(--success-color); }
        .recording .indicator { background-color: #f59e0b; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        #visualizer {
            width: 100%;
            height: 40px;
            background: #0f172a;
            border-radius: 0.5rem;
        }

        @media (max-width: 768px) { .results { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>SpeechHub</h1>
        </header>

        <div class="config-bar">
            <div class="input-group">
                <label>Mode:</label>
                <select id="modeSelect">
                    <option value="translation">Translator (STT + Translation)</option>
                    <option value="chat">AI Chat (Vocal LLM)</option>
                </select>
            </div>
            <div class="input-group" id="langGroup">
                <label>Translate To:</label>
                <select id="targetLang">
                    <option value="Hindi">Hindi</option>
                    <option value="Spanish">Spanish</option>
                    <option value="French">French</option>
                    <option value="German">German</option>
                    <option value="Japanese">Japanese</option>
                    <option value="English">English</option>
                </select>
            </div>
            <div class="status-bar" id="statusContainer">
                <div class="indicator"></div>
                <span id="statusText">Disconnected</span>
            </div>
        </div>

        <div class="controls">
            <button id="startBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
                Start Listening
            </button>
            <button id="stopBtn" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/></svg>
                Stop
            </button>
            <button id="downloadBtn" style="background: transparent; color: var(--text-secondary); border: 1px solid #334155;">
                Download Text
            </button>
        </div>

        <div class="results">
            <div class="card">
                <div class="card-header">
                    <h2>Transcription</h2>
                    <button class="copy-btn" onclick="copyText('transcription')">Copy</button>
                </div>
                <div id="transcription" class="content">...</div>
            </div>
            <div class="card">
                <div class="card-header">
                    <h2>Translation</h2>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="copy-btn" id="speakBtn" title="Listen to translation">🔊 Play</button>
                        <button class="copy-btn" onclick="copyText('translation')">Copy</button>
                    </div>
                </div>
                <div id="translation" class="content">...</div>
            </div>
        </div>
        
        <canvas id="visualizer"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
